[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-q --html=artifacts/reports/pytest-report.html --self-contained-html"
testpaths = ["tests"]
markers = [
  "smoke: marks smoke tests",
  "regression: marks regression tests",
  "patient: marks patient-related tests",
  "device: marks device-setting-related tests",
  "impedance: marks impedance-related tests",
  "start: marks startup and system-module-related tests",
  "ui: marks real desktop UI smoke tests",
  "formal: marks formal YAML case execution entry",
  "v2: marks v2 step-based case tests",
]
