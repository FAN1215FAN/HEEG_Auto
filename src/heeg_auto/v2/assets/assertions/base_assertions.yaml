断言资产:
  - 断言标识: device.settings.visible
    中文名称: 设备设置窗口已出现
    用途说明: 打开设备设置后窗口已出现
    检查项:
      - 名称: 设备设置窗口可见
        动作: 等待窗口
        窗口: 设备设置

  - 断言标识: device.settings.closed
    中文名称: 设备设置已关闭
    用途说明: 点击确定后设备设置窗口关闭
    检查项:
      - 名称: 设备设置窗口关闭
        动作: 断言窗口关闭
        窗口: 设备设置

  - 断言标识: simulator.confirm.visible
    中文名称: 模拟器确认窗口已出现
    用途说明: 检测到模拟器时确认弹窗出现
    检查项:
      - 名称: 模拟器确认窗口可见
        动作: 等待窗口
        窗口: 模拟器确认窗口

  - 断言标识: realtime.window.visible
    中文名称: 实时采集窗口已出现
    用途说明: 进入实时采集流程后窗口可见
    检查项:
      - 名称: 实时采集窗口可见
        动作: 等待窗口
        窗口: 实时采集窗口

  - 断言标识: impedance.window.visible
    中文名称: 阻抗窗口已出现
    用途说明: 打开阻抗界面后窗口可见
    检查项:
      - 名称: 阻抗窗口可见
        动作: 等待窗口
        窗口: 阻抗窗口