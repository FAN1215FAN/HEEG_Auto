模块标识: patient.create
模块名称: 新建患者
元素清单: patient.create
参数说明:
  - 患者姓名
  - 性别
  - 利手
  - 病历号
  - 脑电号
  - 备注
  - 预期错误包含
步骤:
  - 名称: 点击新增
    动作: 单击
    元素: 新增按钮
  - 名称: 等待创建患者
    动作: 等待窗口
    元素: 创建患者标题
  - 名称: 输入姓名
    动作: 输入
    元素: 姓名输入框
    值: ${患者姓名}
  - 名称: 选择性别
    动作: 下拉选择
    元素: 性别下拉框
    值: ${性别}
  - 名称: 选择利手
    动作: 选择单选
    元素: ${利手}
  - 名称: 输入病历号
    动作: 输入
    元素: 病历号输入框
    值: ${病历号}
    条件参数: 病历号
  - 名称: 输入脑电号
    动作: 输入
    元素: 脑电号输入框
    值: ${脑电号}
    条件参数: 脑电号
  - 名称: 输入备注
    动作: 输入
    元素: 备注输入框
    值: ${备注}
    条件参数: 备注
  - 名称: 点击确定
    动作: 单击
    元素: 确定按钮
断言:
  创建成功:
    - 名称: 创建患者区域关闭
      动作: 断言窗口关闭
      元素: 创建患者标题
    - 名称: 主界面出现患者姓名
      动作: 断言文本可见
      文本: ${患者姓名}
  创建失败:
    - 名称: 创建患者区域仍存在
      动作: 断言存在
      元素: 创建患者标题
    - 名称: 看到预期错误文本
      动作: 断言文本可见
      文本: ${预期错误包含}
      可选: true
