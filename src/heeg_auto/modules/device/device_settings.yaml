模块标识: device.settings
模块名称: 设备设置
元素清单: device.settings
参数说明:
  - 设备类型
  - 采样率
  - 波特率
  - 头盒数目
  - IP地址
  - IP地址2
  - 端口
  - 设备名称
  - 设备增益
  - 预期状态
步骤:
  - 名称: 打开设备设置
    动作: 单击
    元素: 设备设置按钮
  - 名称: 等待设备设置
    动作: 等待窗口
    元素: 设备设置标题
  - 名称: 选择设备类型
    动作: 下拉选择
    元素: 设备类型下拉框
    值: ${设备类型}
    条件参数: 设备类型
  - 名称: 选择采样率
    动作: 下拉选择
    元素: 采样率下拉框
    值: ${采样率}
    条件参数: 采样率
  - 名称: 选择波特率
    动作: 下拉选择
    元素: 波特率下拉框
    值: ${波特率}
    条件参数: 波特率
  - 名称: 选择头盒数目
    动作: 下拉选择
    元素: 头盒数目下拉框
    值: ${头盒数目}
    条件参数: 头盒数目
  - 名称: 输入IP地址
    动作: 输入
    元素: IP地址输入框
    值: ${IP地址}
    条件参数: IP地址
  - 名称: 输入IP地址2
    动作: 输入
    元素: IP地址2输入框
    值: ${IP地址2}
    条件参数: IP地址2
  - 名称: 输入端口
    动作: 输入
    元素: 端口输入框
    值: ${端口}
    条件参数: 端口
  - 名称: 输入设备名称
    动作: 输入
    元素: 设备名称输入框
    值: ${设备名称}
    条件参数: 设备名称
  - 名称: 选择设备增益
    动作: 下拉选择
    元素: 设备增益下拉框
    值: ${设备增益}
    条件参数: 设备增益
  - 名称: 点击设备设置确认
    动作: 单击
    元素: 设备设置确认按钮
断言:
  PASS:
    - 名称: 设备设置窗口关闭
      动作: 断言窗口关闭
      元素: 设备设置标题
