断言资产:
  - 断言标识: app.main.visible
    中文名称: 患者主界面已出现
    用途说明: 软件启动或复用后主界面已出现
    检查项:
      - 名称: 患者主界面可见
        动作: 等待窗口
        窗口: 患者主界面

  - 断言标识: patient.create.opened
    中文名称: 创建患者窗口打开
    用途说明: 点击新增后创建患者窗口出现
    检查项:
      - 名称: 创建患者窗口可见
        动作: 等待窗口
        窗口: 创建患者

  - 断言标识: patient.create.closed
    中文名称: 创建患者页面关闭
    用途说明: 关闭创建患者窗口后弹窗消失
    检查项:
      - 名称: 创建患者窗口关闭
        动作: 断言窗口关闭
        窗口: 创建患者

  - 断言标识: patient.create.success
    中文名称: 创建患者成功
    用途说明: 点击确定后创建患者窗口关闭，主界面出现患者姓名
    检查项:
      - 名称: 创建患者窗口关闭
        动作: 断言窗口关闭
        窗口: 创建患者
      - 名称: 主界面出现患者姓名
        动作: 断言文本可见
        文本: ${患者姓名}