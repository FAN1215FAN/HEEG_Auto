断言组目录:
  - 模块: patient.create
    模块名称: 新建患者
    断言组:
      - 名称: 创建成功
        判定对象: 新建患者流程
        判定条件: 点击确定后创建患者窗口关闭，且主界面可见当前患者姓名
        成功标准: 两条断言均通过
        失败标准: 任一断言失败或窗口未正常关闭
        依据来源: UI界面标题与主界面文本
        备注: 对应 patient.create 模块的正向创建场景
      - 名称: 创建失败
        判定对象: 新建患者流程
        判定条件: 创建患者窗口仍存在，且可见预期错误文本（若配置）
        成功标准: 窗口保留且错误提示符合预期
        失败标准: 窗口被关闭或错误提示不符合预期
        依据来源: UI界面标题与错误提示文本
        备注: 对应 patient.create 模块的异常输入场景
  - 模块: device.settings
    模块名称: 设备设置
    断言组:
      - 名称: 设置成功
        判定对象: 设备设置流程
        判定条件: 点击确定后设备设置窗口关闭
        成功标准: 设备设置窗口从当前窗口树中消失
        失败标准: 设备设置窗口仍存在或关闭状态无法确认
        依据来源: UI界面标题
        备注: 对应 device.settings 模块的正向设置场景
      - 名称: 设置失败
        判定对象: 设备设置流程
        判定条件: 点击提交后设备设置窗口仍存在
        成功标准: 设备设置窗口继续存在，便于后续补充错误提示断言
        失败标准: 设备设置窗口意外关闭
        依据来源: UI界面标题
        备注: 当前先保留结构，后续按业务需要补充具体错误提示断言
  - 模块: system.launch
    模块名称: 启动软件
    断言组: []
