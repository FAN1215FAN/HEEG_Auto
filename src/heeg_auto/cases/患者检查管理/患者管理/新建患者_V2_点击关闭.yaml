用例编号: 患者管理_V2_01
用例名称: 新建患者_V2_点击关闭
标签:
  - smoke
  - patient
  - v2
步骤:
  - 名称: 打开创建患者窗口
    窗口: 患者列表
    按钮: 新增
    断言: 创建患者窗口打开

  - 名称: 填写创建患者表单
    窗口: 创建患者
    参数:
      患者姓名: 哈哈123
      出生日期: 2024-12-12
      年龄: 2
      性别: 女
      利手: 左利手
      病历号: test123
      脑电号: test123456
      备注: 正向样板123

  - 名称: 关闭创建患者窗口
    窗口: 创建患者
    按钮: 底部关闭按钮
    断言: 创建患者页面关闭