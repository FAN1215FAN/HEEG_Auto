用例编号: 设备设置_V2_01
用例名称: 设备设置_V2_采样率校验
标签:
  - device
  - v2
变参:
  参数:
    - 设备类型
    - 采样率
    - 设备增益
  候选值:
    - [Neusen HEEG, 1000, 6]
    - [Neusen U32, 2000, 8]
    - [Neusen HEEG, 4000, 6]
步骤:
  - 名称: 打开设备设置窗口
    窗口: 患者主界面
    按钮: 设备设置
    断言: 设备设置窗口已出现

  - 名称: 填写设备设置表单
    窗口: 设备设置
    参数:
      设备类型: ${设备类型}
      采样率: ${采样率}
      设备增益: ${设备增益}
      IP地址1: 192.168.1.123

  - 名称: 保存设备设置
    窗口: 设备设置
    按钮: 确定
    断言: 设备设置已关闭