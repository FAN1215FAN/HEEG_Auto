用例编号: 历史回放剪辑_01
用例名称: 自动化测试数据1_手动数据剪辑
标签:
  - smoke
  - history_replay
  - clip

数据:
  记录名称: 自动化测试数据1
  原始记录时长: 00:00:42
  剪辑开始时间: 00:00:01
  剪辑结束时间: 00:00:02
  主窗口新增记录时长: 00:00:02
  波形起点X比例: 0.14
  波形起点Y比例: 0.55
  波形终点X比例: 0.28
  波形终点Y比例: 0.55

步骤:
  - 名称: 选中目标检查记录
    窗口: 数字脑电采集记录软件窗口
    元素: 自动化测试数据1检查记录

  - 名称: 打开历史回放窗口
    窗口: 数字脑电采集记录软件窗口
    按钮: 回放
    断言: 历史回放窗口已出现

  - 名称: 打开数据剪辑窗口
    窗口: 历史回放窗口
    按钮: 数据剪辑
    断言: 数据剪辑窗口已出现

  - 名称: 在波形区域拖选片段
    窗口: 历史回放窗口
    动作: 拖动
    参数:
      定位方式: 波形比例
      起点X比例: ${波形起点X比例}
      起点Y比例: ${波形起点Y比例}
      终点X比例: ${波形终点X比例}
      终点Y比例: ${波形终点Y比例}
    断言: 数据剪辑片段已生成

  - 名称: 执行剪辑
    窗口: 数据剪辑窗口
    按钮: 剪辑

  - 名称: 确认剪辑完成
    窗口: 剪辑完成窗口
    按钮: 确定
    断言: 剪辑完成窗口已关闭

  - 名称: 关闭历史回放窗口
    窗口: 历史回放窗口
    按钮: 标题栏关闭按钮
    断言: 历史回放窗口已关闭

  - 名称: 断言主窗口新增最新剪辑记录
    窗口: 数字脑电采集记录软件窗口
    断言: 主窗口已新增最新剪辑记录
