# 适用：同一条 case 需要按多组候选值独立执行

用例编号: 示例_01
用例名称: 变参示例
标签:
  - smoke

变参:
  参数:
    - 设备类型
    - 采样率
  候选值:
    - [Neusen HEEG, 1000]
    - [Neusen U32, 2000]

步骤:
  - 名称: 打开设备设置
    窗口: 患者主界面
    按钮: 设备设置
    断言: 设备设置窗口已出现

  - 名称: 填写设备设置
    窗口: 设备设置
    参数:
      设备类型: ${设备类型}
      采样率: ${采样率}

  - 名称: 保存设备设置
    窗口: 设备设置
    按钮: 确定
    断言: 设备设置已关闭
