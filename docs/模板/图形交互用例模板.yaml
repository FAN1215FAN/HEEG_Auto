# 适用：历史回放、实时采集等需要比例参数的图形交互 case

用例编号: 图形交互_01
用例名称: 示例_图形交互
标签:
  - replay

数据:
  波形起点X比例: 0.14
  波形起点Y比例: 0.55
  波形终点X比例: 0.28
  波形终点Y比例: 0.55

步骤:
  - 名称: 打开目标窗口
    窗口: 患者主界面
    按钮: 打开
    断言: 目标窗口已出现

  - 名称: 在图形区域拖动
    窗口: 图形窗口
    动作: 拖动
    参数:
      定位方式: 波形比例
      起点X比例: ${波形起点X比例}
      起点Y比例: ${波形起点Y比例}
      终点X比例: ${波形终点X比例}
      终点Y比例: ${波形终点Y比例}
    断言: 图形交互已生效
